services:
  backend:
    command: npm run develop
    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules
      - ./apps/backend/uploads:/app/public/uploads
      - ./scripts:/scripts:ro

  frontend:
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
