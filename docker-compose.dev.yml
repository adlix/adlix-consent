# Entwicklungsumgebung: Hot Reload via Volume-Mounts
# Verwendung: make dev  ODER  docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      target: dev
    command: npm run develop
    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules
      - ./apps/backend/uploads:/app/public/uploads
    environment:
      NODE_ENV: development

  frontend:
    build:
      target: dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
